<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTrack - Trace Natural & Ayurvedic Products</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600&display=swap');

        :root {
            --primary: #10b981;
            --bg: #f8fafc;
            --text: #1e293b;
            --card: #ffffff;
            --border: #e2e8f0;
        }

        [data-theme="dark"] {
            --primary: #34d399;
            --bg: #0f172a;
            --text: #e2e8f0;
            --card: #1e293b;
            --border: #334155;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: background-color 0.4s, color 0.4s;
        }

        .logo-font { font-family: 'Space Grotesk', sans-serif; }

        .hero-bg {
            background: linear-gradient(135deg, #ecfdf5 0%, #f0fdf4 100%);
        }
        [data-theme="dark"] .hero-bg {
            background: linear-gradient(135deg, #064e3b 0%, #065f46 100%);
        }

        .card-hover {
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            background: var(--card);
            border-color: var(--border);
        }

        .card-hover:hover {
            transform: translateY(-12px) scale(1.03);
            box-shadow: 0 25px 50px -12px rgba(16, 185, 129, 0.25);
        }

        .scan-qr { animation: qrPulse 2s infinite; }

        @keyframes qrPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        .chat-window {
            transition: all 0.3s ease;
        }

        .chat-bubble-user {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 0;
        }

        .chat-bubble-bot {
            background: var(--card);
            border: 1px solid var(--border);
            border-bottom-left-radius: 0;
        }

        /* Floating chat button */
        #chat-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(16,185,129,0.4);
            cursor: pointer;
            transition: all 0.3s;
        }

        #chat-btn:hover { transform: scale(1.1); }

        /* Chat container */
        #chat-container {
            position: fixed;
            bottom: 100px;
            right: 24px;
            width: 380px;
            height: 520px;
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
            overflow: hidden;
            display: none;
            flex-direction: column;
            z-index: 9999;
            border: 1px solid var(--border);
        }

        #chat-header {
            background: var(--primary);
            color: white;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #chat-messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #chat-input-area {
            padding: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }

        #chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 9999px;
            outline: none;
            background: var(--bg);
            color: var(--text);
        }

        /* Dark mode adjustments */
        [data-theme="dark"] #chat-btn { box-shadow: 0 10px 25px rgba(52,211,153,0.4); }
    </style>
</head>
<body data-theme="light">

    <!-- Dark Mode Toggle in Navbar -->
    <nav class="fixed top-0 left-0 right-0 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md z-50 border-b border-emerald-100 dark:border-slate-700 transition-colors">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-emerald-600 rounded-2xl flex items-center justify-center shadow-inner">
                    <i class="fa-solid fa-leaf text-white text-2xl"></i>
                </div>
                <div class="logo-font text-3xl font-semibold tracking-tighter text-emerald-700 dark:text-emerald-400">EcoTrack</div>
            </div>
            <div class="flex items-center gap-6">
                <button id="theme-toggle" class="text-2xl text-gray-700 dark:text-gray-200 hover:scale-110 transition">
                    <i class="fa-solid fa-sun"></i>
                </button>
                <div onclick="showHome()" class="flex items-center gap-2 text-emerald-600 dark:text-emerald-400 hover:text-emerald-700 dark:hover:text-emerald-300 cursor-pointer font-medium">
                    <i class="fa-solid fa-arrow-left"></i>
                    <span>Back to Home</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Floating Chat Button (visible on all pages) -->
    <div id="chat-btn">
        <i class="fa-solid fa-comment-dots text-2xl"></i>
    </div>

    <!-- Chat Window -->
    <div id="chat-container">
        <div id="chat-header">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
                    <i class="fa-solid fa-robot"></i>
                </div>
                <div>
                    <div class="font-semibold">EcoTrack Assistant</div>
                    <div class="text-xs opacity-80">Ask anything about natural products</div>
                </div>
            </div>
            <button id="close-chat" class="text-2xl hover:opacity-80">×</button>
        </div>

        <div id="chat-messages">
            <!-- Messages will be added here -->
        </div>

        <div id="chat-input-area">
            <input id="chat-input" type="text" placeholder="Ask about honey, ashwagandha, purity..." autocomplete="off">
            <button id="send-message" class="w-12 h-12 bg-emerald-600 rounded-full text-white flex items-center justify-center hover:bg-emerald-700">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <!-- Your existing content (home-view, scan-view, modal, etc.) goes here -->
    <!-- ... paste your previous main content (div id="home-view", etc.) ... -->

    <!-- FOOTER (make sure it uses var(--text), etc. where needed) -->
    <footer class="bg-emerald-950 dark:bg-slate-950 text-white py-12 mt-16">
        <!-- ... existing footer ... -->
    </footer>

    <script>
        // =====================================
        // DARK MODE
        // =====================================
        const themeToggle = document.getElementById('theme-toggle');
        const html = document.documentElement;

        function setTheme(theme) {
            html.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            themeToggle.innerHTML = theme === 'dark' 
                ? '<i class="fa-solid fa-moon"></i>' 
                : '<i class="fa-solid fa-sun"></i>';
        }

        const savedTheme = localStorage.getItem('theme') || 
            (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        
        setTheme(savedTheme);

        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            setTheme(current === 'dark' ? 'light' : 'dark');
        });

        // =====================================
        // AI CHATBOT (demo version)
        // =====================================
        const chatBtn = document.getElementById('chat-btn');
        const chatContainer = document.getElementById('chat-container');
        const closeChat = document.getElementById('close-chat');
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-message');

        function addMessage(text, isUser = false) {
            const msg = document.createElement('div');
            msg.className = `max-w-[80%] p-3 rounded-2xl ${isUser ? 'chat-bubble-user ml-auto' : 'chat-bubble-bot mr-auto'}`;
            msg.textContent = text;
            chatMessages.appendChild(msg);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Initial greeting
        function initChat() {
            chatMessages.innerHTML = '';
            addMessage("Namaste! 🌿 I'm your EcoTrack assistant. How can I help you today?\nYou can ask about:\n• Product purity\n• Ayurvedic benefits\n• How to scan QR\n• Carbon footprint\n• Organic certification", false);
        }

        // Simple rule-based responses (you can later connect real AI)
        function getBotResponse(userText) {
            const text = userText.toLowerCase();

            if (text.includes("hello") || text.includes("hi") || text.includes("namaste")) {
                return "Namaste! How can I assist you with natural products today? 🌱";
            }
            if (text.includes("honey") || text.includes("himalayan")) {
                return "Pure Himalayan honey is rich in antioxidants. Look for ECO-2026-7841 on the label — it’s traceable from high-altitude apiaries with no added sugar. Want to see its journey?";
            }
            if (text.includes("ashwagandha")) {
                return "Ashwagandha (Withania somnifera) helps reduce stress and improves energy. Our ECO-2026-4578 batch is root-only, lab-tested, no fillers. Ask me about dosage or benefits!";
            }
            if (text.includes("scan") || text.includes("qr")) {
                return "Click 'Scan Natural Product' on the homepage or enter the product ID (like ECO-2026-7841) to see full traceability, purity score & farm origin.";
            }
            if (text.includes("purity") || text.includes("adulteration") || text.includes("fake")) {
                return "Our AI checks for common adulterants (sugar in honey, synthetic in herbs, etc.) with 94% accuracy. Blockchain ensures no tampering in records.";
            }
            if (text.includes("thank")) {
                return "You're welcome! Happy to help you choose pure & authentic natural products. 🌿🙏";
            }

            return "I'm still learning... Could you tell me more? For example:\n• Is this honey pure?\n• Benefits of Triphala?\n• How does traceability work?";
        }

        function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            addMessage(text, true);
            chatInput.value = '';

            // Simulate thinking delay
            setTimeout(() => {
                const reply = getBotResponse(text);
                addMessage(reply, false);
            }, 800);
        }

        // Events
        chatBtn.addEventListener('click', () => {
            chatContainer.style.display = 'flex';
            if (chatMessages.children.length === 0) initChat();
            chatInput.focus();
        });

        closeChat.addEventListener('click', () => {
            chatContainer.style.display = 'none';
        });

        sendBtn.addEventListener('click', sendMessage);

        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        // =====================================
        // Your existing showScan(), showHome(), simulateScan(), etc.
        // =====================================
        // ... paste your previous script functions here ...

        window.onload = () => {
            console.log('%cEcoTrack with Dark Mode + ChatBot ready!', 'color:#10b981; font-weight:bold');
            // ... your existing onload code ...
        };
    </script>
</body>
</html>
